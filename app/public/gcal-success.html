<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Google Agenda - Conectado</title>
  <style>
    body { margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; background: #0a0a0a; font-family: sans-serif; }
    .box { text-align: center; color: #fff; }
    .icon { font-size: 48px; margin-bottom: 16px; }
    p { color: #aaa; font-size: 14px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">✅</div>
    <h2 style="margin:0;color:#4ade80">Conectado!</h2>
    <p>Fechando esta janela...</p>
  </div>
  <script>
    try {
      window.opener?.postMessage({ gcal: 'success' }, '*');
    } catch(e) {}
    setTimeout(function() { window.close(); }, 1000);
  </script>
</body>
</html>
