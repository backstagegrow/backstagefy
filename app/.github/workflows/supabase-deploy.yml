name: Deploy Supabase

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - 'supabase/migrations/**'
      - '.github/workflows/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v3

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy whatsapp-manager --project-ref bleqjcxwtgzwbkediusr --no-verify-jwt
          supabase functions deploy ai-concierge --project-ref bleqjcxwtgzwbkediusr --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # Optional: Auto-apply migrations
      # - name: Deploy Migrations
      #   run: supabase db push --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
      #   env:
          # SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          # DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
